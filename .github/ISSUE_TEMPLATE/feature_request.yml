name: Feature request
description: Suggest a new capability, workflow improvement, or pattern type.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What are you trying to do that the project does not handle well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe the feature as concretely as possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve it, including current workarounds.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Engine
        - Shader pipeline
        - UI/UX
        - Export
        - Documentation
        - Deployment
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links, screenshots, papers, textile references, or examples from similar tools.
