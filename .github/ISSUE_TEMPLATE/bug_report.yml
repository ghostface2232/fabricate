name: Bug report
description: Report a reproducible problem in the app or rendering pipeline.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact controls, pattern type, and preview mode when relevant.
      placeholder: |
        1. Open the app
        2. Switch to ...
        3. Change ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, GPU if relevant.
      placeholder: Chrome 136 / Windows 11 / RTX 4070
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, logs, stack traces, or texture output notes.
